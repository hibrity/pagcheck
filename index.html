<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PagCheck - Login 100% Direto</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body { background:#f5f7fa; padding:16px; }
    .tela-acesso { max-width:420px; margin:80px auto; background:white; padding:24px; border-radius:10px; box-shadow:0 4px 12px rgba(0,0,0,.08); }
    h2 { text-align:center; margin-bottom:20px; color:#1e293b; }
    input { width:100%; padding:12px; margin-bottom:12px; border:1px solid #cbd5e1; border-radius:6px; font-size:1rem; }
    button { width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; font-size:1rem; margin-bottom:10px; }
    .aviso { display:none; padding:10px; border-radius:6px; text-align:center; margin-top:10px; }
    .erro { background:#fef2f2; color:#dc2626; }
    .sucesso { background:#f0fdf4; color:#16a34a; }
    .troca-form { text-align:center; color:#2563eb; cursor:pointer; font-size:.9rem; margin-top:10px; }
    .painel-principal { display:none; max-width:1200px; margin:0 auto; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .btn-sair { background:#ef4444; width:auto; padding:8px 16px; }
  </style>
</head>
<body>

<div id="telaAcesso" class="tela-acesso">
  <div id="formLogin">
    <h2>Entrar</h2>
    <input type="email" id="emailLogin" placeholder="E-mail">
    <input type="password" id="senhaLogin" placeholder="Senha">
    <!-- AQUI: onclick DIRETO -->
    <button onclick="fazerLogin()">Entrar</button>
    <div id="avisoLogin" class="aviso erro"></div>
    <div class="troca-form" onclick="mostrarCadastro()">Cadastre-se</div>
  </div>

  <div id="formCadastro" style="display:none;">
    <h2>Cadastrar</h2>
    <input type="text" id="nomeCad" placeholder="Nome">
    <input type="email" id="emailCad" placeholder="E-mail">
    <input type="password" id="senhaCad" placeholder="Senha">
    <!-- AQUI: onclick DIRETO -->
    <button onclick="fazerCadastro()">Cadastrar</button>
    <div id="avisoCad" class="aviso erro"></div>
    <div class="troca-form" onclick="mostrarLogin()">Já tenho conta</div>
  </div>
</div>

<div id="painel" class="painel-principal">
  <div class="header">
    <h1>PagCheck</h1>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
  <p>Painel funcionando ✅</p>
</div>

<script>
// Configuração
const SUPABASE_URL = "https://rxbojrrqjclosqozixcg.supabase.co";
const SUPABASE_CHAVE = "sb_publishable_qDseeu571ny1vWGXhUNoXQ_hGnTQhGT";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_CHAVE);
let CLIENTE_ID = null;

// Alternar telas
function mostrarCadastro() {
  document.getElementById('formLogin').style.display = 'none';
  document.getElementById('formCadastro').style.display = 'block';
}
function mostrarLogin() {
  document.getElementById('formCadastro').style.display = 'none';
  document.getElementById('formLogin').style.display = 'block';
}
function avisar(id, texto, tipo='erro') {
  const el = document.getElementById(id);
  el.textContent = texto;
  el.className = 'aviso ' + tipo;
  el.style.display = 'block';
}

// Login — FUNÇÃO CHAMADA DIRETO DO BOTÃO
async function fazerLogin() {
  const email = document.getElementById('emailLogin').value.trim();
  const senha = document.getElementById('senhaLogin').value;
  if (!email || !senha) return avisar('avisoLogin', 'Preencha tudo');
  
  avisar('avisoLogin', 'Aguarde...', 'sucesso');
  const {data, error} = await supabase.auth.signInWithPassword({email, password: senha});
  
  if (error) return avisar('avisoLogin', 'Erro: ' + error.message);
  await pegarCliente(data.user);
  abrirPainel();
}

// Cadastro — FUNÇÃO CHAMADA DIRETO DO BOTÃO
async function fazerCadastro() {
  const nome = document.getElementById('nomeCad').value.trim();
  const email = document.getElementById('emailCad').value.trim();
  const senha = document.getElementById('senhaCad').value;
  if (!nome || !email || !senha) return avisar('avisoCad', 'Preencha tudo');
  if (senha.length < 6) return avisar('avisoCad', 'Senha mínima 6 caracteres');

  avisar('avisoCad', 'Criando conta...', 'sucesso');
  const {data, error} = await supabase.auth.signUp({email, password: senha});
  
  if (error) return avisar('avisoCad', 'Erro: ' + error.message);
  await pegarCliente(data.user, nome);
  abrirPainel();
}

// Pegar/criar cliente
async function pegarCliente(usuario, nome='Sem Nome') {
  const {data} = await supabase.from('estabelecimentos').select('cliente_id').eq('usuario_id', usuario.id).single();
  if (data) return CLIENTE_ID = data.cliente_id;
  const {data:novo} = await supabase.from('estabelecimentos').insert({usuario_id:usuario.id, cliente_id:usuario.id, nome:nome}).select();
  CLIENTE_ID = novo.cliente_id;
}

function abrirPainel() {
  document.getElementById('telaAcesso').style.display = 'none';
  document.getElementById('painel').style.display = 'block';
}
async function sair() {
  await supabase.auth.signOut();
  CLIENTE_ID = null;
  document.getElementById('telaAcesso').style.display = 'block';
  document.getElementById('painel').style.display = 'none';
}

// Verifica se já logado ao carregar
document.addEventListener('DOMContentLoaded', async () => {
  const {data:{session}} = await supabase.auth.getSession();
  if (session) {
    await pegarCliente(session.user);
    abrirPainel();
  }
});
</script>

</body>
</html>
